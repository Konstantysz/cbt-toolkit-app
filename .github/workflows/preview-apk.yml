name: Preview APK

on:
  push:
    branches: [develop]

concurrency:
  group: preview-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build Preview APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Create local.properties
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/cbt-toolkit-app-preview-${SHORT_SHA}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-apk-${{ github.sha }}
          path: android/app/build/outputs/apk/release/cbt-toolkit-app-preview-*.apk
          retention-days: 30
